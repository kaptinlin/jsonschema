version: "2"

run:
  timeout: 10m
  go: "1.26"
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA1019"
        - "-ST1000"

issues:
  max-issues-per-linter: 10
  max-same-issues: 3

output:
  format: colored-line-number
  print-linter-name: true
  sort-results: true
